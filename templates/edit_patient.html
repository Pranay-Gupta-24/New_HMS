<!DOCTYPE html>
<html>
<head>
    <title>Edit Patient</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            margin: 0;
        }

        .container {
            max-width: 700px;
            margin: 60px auto;
        }

        .card {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        label {
            font-weight: 600;
            display: block;
            margin-top: 10px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .full {
            grid-column: span 2;
        }

        .btn {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        .btn:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card">

        <h2>Edit Patient</h2>

        <form method="POST">

            <div class="grid">

                <div class="full">
                    <label>Name</label>
                    <input type="text" name="name" value="{{ patient[1] }}">
                </div>

                <div>
                    <label>Age</label>
                    <input type="number" name="age" value="{{ patient[2] }}">
                </div>

                <div>
                    <label>Gender</label>
                    <select name="gender">
                        <option value="Male" {{ 'selected' if patient[3]=='Male' else '' }}>Male</option>
                        <option value="Female" {{ 'selected' if patient[3]=='Female' else '' }}>Female</option>
                    </select>
                </div>

                <div>
                    <label>State</label>
                    <input type="text" name="state" value="{{ patient[4] }}">
                </div>

                <div>
                    <label>Phone</label>
                    <input type="text" name="phone" value="{{ patient[5] }}">
                </div>

                <div class="full">
                    <label>Blood Group</label>
                    <input type="text" name="blood" value="{{ patient[6] }}">
                </div>

            </div>

            <button class="btn" type="submit">Update Patient</button>

        </form>

    </div>
</div>

</body>
</html>
