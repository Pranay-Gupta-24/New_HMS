<form method="POST">

    <input type="hidden" name="id" value="{{ appointment[0] }}">

    <label>Date</label>
    <input type="date" name="date" value="{{ appointment[2] }}">

    <label>Status</label>
    <select name="status">
        <option value="Pending" {{ 'selected' if appointment[3]=='Pending' else '' }}>Pending</option>
        <option value="Approved" {{ 'selected' if appointment[3]=='Approved' else '' }}>Approved</option>
        <option value="Completed" {{ 'selected' if appointment[3]=='Completed' else '' }}>Completed</option>
    </select>

    <button type="submit">Update</button>

</form>
