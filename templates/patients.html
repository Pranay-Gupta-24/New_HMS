<!DOCTYPE html>
<html>
<head>
    <title>Patients</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">MediCare HMS</div>
    <div class="nav-links">
        <a href="/dashboard">Dashboard</a>
        <a href="/doctors">Doctors</a>
        <a href="/patients">Patients</a>
        <a href="/appointments">Appointments</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="container">

    <h2>Patient Management</h2>

    <!-- FORM -->
   <div class="form-card">
    <form method="POST" class="patient-form">

        <input type="text" name="name" placeholder="Patient Name" required>
        <input type="number" name="age" placeholder="Age" required>

        <select name="sex" required>
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
        </select>

        <input type="text" name="address" placeholder="Address">
        <input type="text" name="phone" placeholder="Phone Number">
        <input type="text" name="blood" placeholder="Blood Group">

        <input type="text" name="username" placeholder="Username">
        <input type="password" name="password" placeholder="Password">

        <button type="submit" class="add-btn">Add Patient</button>

    </form>
</div>

    <!-- TABLE -->
    <div class="card">
        <h3>Patient List</h3>

        <table>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Age</th>
                <th>Sex</th>
                <th>Address</th>
                <th>Phone</th>
                <th>Blood Group</th>
                <th>Actions</th>
            </tr>

            {% for p in patients %}
            <tr>
                <td>{{p[0]}}</td>
                <td>{{p[1]}}</td>
                <td>{{p[2]}}</td>
                <td>{{p[3]}}</td>
                <td>{{p[4]}}</td>
                <td>{{p[5]}}</td>
                <td>{{p[6]}}</td>
                <td>
    <a href="/edit_patient/{{ p[0] }}" class="btn edit">Edit</a>
    <a href="/delete_patient/{{ p[0] }}" class="btn delete"
       onclick="return confirm('Delete this patient?')">Delete</a>
</td>
            </tr>
            {% endfor %}
        </table>
    </div>

</div>

</body>
</html>
