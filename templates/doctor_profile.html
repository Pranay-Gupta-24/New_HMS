<!DOCTYPE html>
<html>
<head>
    <title>Doctor Profile</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='doctor_dashboard.css') }}">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">Doctor Panel</div>
    <div class="nav-links">
        <a href="/doctor_dashboard">Dashboard</a>
        <a href="/doctor_profile">Edit Profile</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="container">

<h2>My Profile</h2>
{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="alert {{category}}">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}

<div class="card profile-card">

<form method="POST">

    <div class="form-grid">

        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" value="{{doctor[0]}}" required>
        </div>

        <div class="form-group">
            <label>Specialization</label>
            <input type="text" name="spec" value="{{doctor[1]}}" required>
        </div>

        <div class="form-group">
            <label>Consultation Fees (₹)</label>
            <input type="number" name="fees" value="{{doctor[2]}}" required>
        </div>

    </div>

    <button type="submit" class="btn-primary">Update Profile</button>

</form>

</div>

</div>

</body>
</html>
